# Configurazione Zola — Agorà Security website
# Docs: https://www.getzola.org/documentation/getting-started/configuration/

base_url = "https://agorasecurity.it"
title = "Agorà Security"
description = "Cybersecurity europea AI-native costruita su Rust, Linux e Open Source. GRC, security testing, incident response."
default_language = "it"
output_dir = "public"
preserve_dotfiles_in_output = false

compile_sass = true
build_search_index = false
generate_feeds = true
feed_filenames = ["atom.xml"]

minify_html = true

taxonomies = [
  { name = "tags", feed = true },
]

# ------------------------------------------------------------------
# Markdown
# ------------------------------------------------------------------
[markdown]
smart_punctuation = true
render_emoji = false
external_links_target_blank = true
external_links_no_follow = false
external_links_no_referrer = false
bottom_footnotes = true
# highlighting: lasciato al default (disabled). Da abilitare quando
# ci saranno blocchi di codice nei post del blog.

# ------------------------------------------------------------------
# Lingue
# ------------------------------------------------------------------
[languages.en]
title = "Agorà Security"
description = "European AI-native cybersecurity built on Rust, Linux and Open Source. GRC, security testing, incident response."
generate_feeds = true
feed_filenames = ["atom.xml"]
build_search_index = false

[languages.en.translations]
read_more = "Read more"
contact_cta = "Contact us"
language_switch = "Italiano"

[languages.it.translations]
read_more = "Continua a leggere"
contact_cta = "Contattaci"
language_switch = "English"

# ------------------------------------------------------------------
# Extra (variabili custom usate nei template)
# ------------------------------------------------------------------
[extra]
company_name = "Agorà Security S.r.l."
company_short = "Agorà Security"
email = "info@agorasecurity.it"
phone = ""
address_city = "Vicenza"
linkedin = "https://www.linkedin.com/company/agor%C3%A0-security/"
github = "https://github.com/Agora-Security"
argogra = "https://argogra.com/"
brand_blue = "#0066FE"
brand_yellow = "#FFC000"
build_date = ""
